# Deploy para o projeto Vercel em cada push em `main`.
# Secrets no repositório (Settings → Secrets → Actions):
#   VERCEL_TOKEN      — https://vercel.com/account/tokens
#   VERCEL_ORG_ID     — Team/Account ID em Vercel → Project → Settings → General
name: Vercel Production

on:
  push:
    branches:
      - main

env:
  VERCEL_PROJECT_ID: prj_oUoRRIehKvuEVeaYdSj1zxH6iLkm

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
