# Deploy para o projeto Vercel em cada push em `main`.
# Se o mesmo repo já estiver ligado na Vercel (Git → auto-deploy), podes acabar com
# dois deploys por push: desativa um dos lados ou remove este workflow.
# Secrets no repositório (Settings → Secrets → Actions):
#   VERCEL_TOKEN      — https://vercel.com/account/tokens
#   VERCEL_ORG_ID     — Team/Account ID em Vercel → Project → Settings → General
name: Vercel Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERCEL_PROJECT_ID: prj_oUoRRIehKvuEVeaYdSj1zxH6iLkm

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Exigir secrets VERCEL_TOKEN e VERCEL_ORG_ID
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_ORG_ID:-}" ]; then
            echo "::error::Defina os secrets VERCEL_TOKEN e VERCEL_ORG_ID em GitHub → Settings → Secrets and variables → Actions. Opcional: ./scripts/configure-vercel-github-secrets.sh na tua máquina."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
